receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:
  attributes/scrub_pii:
    actions:
      - key: user.email
        action: delete
      - key: customer.pii
        action: delete

exporters:
  debug:
    verbosity: basic
  otlp/clickhouse:
    endpoint: http://clickhouse:4318
    tls:
      insecure: true
  otlp/opensearch:
    endpoint: http://opensearch:9200
    tls:
      insecure: true
  logging:
    loglevel: warn

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/scrub_pii, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [attributes/scrub_pii, batch]
      exporters: [debug]
